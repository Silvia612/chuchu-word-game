<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>楚楚的魔法单词冒险 ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #5a3e36;
        }
        
        /* 星星背景 */
        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .star {
            position: absolute;
            font-size: 20px;
            animation: twinkle 2s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        #game-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }
        
        /* ===== 开始界面 ===== */
        #start-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        .crown {
            font-size: 60px;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .player-card {
            background: white;
            border-radius: 30px;
            padding: 30px 40px;
            margin: 20px 0;
            box-shadow: 0 20px 60px rgba(255, 107, 107, 0.3);
            text-align: center;
        }
        
        .avatar-container {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }
        
        .player-name {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(45deg, #ff6b6b, #ffa07a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .player-title {
            font-size: 16px;
            color: #ff9a9e;
            font-weight: 700;
        }
        
        .story-text {
            font-size: 18px;
            line-height: 1.8;
            color: #7a5a52;
            max-width: 350px;
            margin: 20px auto;
        }
        
        .start-btn {
            padding: 20px 60px;
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #ffa07a);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            transition: all 0.3s;
            margin-top: 20px;
        }
        .start-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.5);
        }
        
        .from-dad {
            margin-top: 30px;
            font-size: 14px;
            color: #a08070;
        }
        .from-dad span {
            font-size: 20px;
        }
        
        /* ===== 游戏界面 ===== */
        #game-screen {
            display: none;
            min-height: 100vh;
            padding: 15px;
        }
        
        /* 顶部信息栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        
        .mini-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .player-info {
            flex: 1;
            margin-left: 12px;
        }
        .player-info .name {
            font-weight: 700;
            font-size: 16px;
        }
        .player-info .level {
            font-size: 12px;
            color: #ff9a9e;
        }
        
        .hearts {
            display: flex;
            gap: 3px;
        }
        .heart {
            font-size: 22px;
            transition: all 0.3s;
        }
        .heart.lost {
            filter: grayscale(1);
            opacity: 0.3;
        }
        
        .coins {
            display: flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            color: #b7791f;
        }
        
        /* 关卡标题 */
        .level-title {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .level-title h2 {
            font-size: 20px;
            color: #ff6b6b;
        }
        .level-title .subtitle {
            font-size: 14px;
            color: #a08070;
        }
        
        /* 游戏主区域 */
        .game-area {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        
        /* 怪物区域 */
        .monster-area {
            text-align: center;
            padding: 20px 0;
        }
        
        .monster-sprite {
            font-size: 100px;
            animation: monsterFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }
        @keyframes monsterFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        .monster-sprite.hit {
            animation: monsterHit 0.5s ease;
        }
        @keyframes monsterHit {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(0.8); filter: brightness(2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        
        .monster-name {
            font-size: 18px;
            font-weight: 700;
            color: #e17055;
            margin-top: 10px;
        }
        
        /* 单词提示 */
        .word-clue {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        
        .clue-label {
            font-size: 12px;
            color: #a08070;
            margin-bottom: 8px;
        }
        
        .clue-meaning {
            font-size: 24px;
            font-weight: 700;
            color: #5a3e36;
        }
        
        .clue-length {
            font-size: 14px;
            color: #a08070;
            margin-top: 5px;
        }
        
        /* 字母格子 */
        .letter-grid {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .letter-cell {
            width: 45px;
            height: 55px;
            background: #f8f9fa;
            border: 3px solid #e9ecef;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            color: #5a3e36;
            transition: all 0.3s;
        }
        .letter-cell.active {
            border-color: #ff9a9e;
            background: #fff5f5;
        }
        .letter-cell.correct {
            border-color: #00b894;
            background: #d4edda;
            animation: popIn 0.3s ease;
        }
        .letter-cell.wrong {
            border-color: #e17055;
            background: #ffe5e5;
            animation: shake 0.4s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        /* 输入区 */
        .input-section {
            margin-top: 20px;
        }
        
        .hint-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .hint-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .hint-btn:hover {
            transform: scale(1.05);
        }
        .hint-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .hint-display {
            text-align: center;
            font-size: 14px;
            color: #6c5ce7;
            min-height: 20px;
            margin-bottom: 10px;
        }
        
        .word-input {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            text-transform: lowercase;
            border: 3px solid #e9ecef;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s;
            background: #f8f9fa;
            color: #5a3e36;
        }
        .word-input:focus {
            border-color: #ff9a9e;
            background: white;
            box-shadow: 0 5px 20px rgba(255, 154, 158, 0.2);
        }
        .word-input::placeholder {
            color: #b0a0a0;
        }
        
        /* 鼓励语 */
        .encouragement {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #a08070;
        }
        .encouragement span {
            font-size: 18px;
        }
        
        /* ===== 成功动画 ===== */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .success-content {
            text-align: center;
            padding: 40px;
        }
        
        .success-icon {
            font-size: 100px;
            animation: celebrate 0.5s ease;
        }
        @keyframes celebrate {
            0% { transform: scale(0) rotate(-180deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        
        .success-text {
            font-size: 28px;
            font-weight: 900;
            color: #00b894;
            margin: 20px 0;
        }
        
        .success-points {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(45deg, #fdcb6e, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* ===== 结果界面 ===== */
        .result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .result-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 100%;
        }
        
        .result-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }
        
        .result-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
        }
        .result-title.win { color: #00b894; }
        .result-title.lose { color: #e17055; }
        
        .result-message {
            font-size: 16px;
            color: #7a5a52;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .result-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 25px 0;
        }
        
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 900;
            color: #ff6b6b;
        }
        .stat-label {
            font-size: 12px;
            color: #a08070;
        }
        
        .result-btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #ffa07a);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .result-btn:hover {
            transform: scale(1.02);
        }
        
        /* 收集的宝石 */
        .gems-collected {
            margin: 20px 0;
        }
        .gems-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .gem {
            font-size: 30px;
            animation: gemPop 0.3s ease;
        }
        @keyframes gemPop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        
        /* 隐藏 */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>
    
    <div id="game-container">
        <!-- ===== 开始界面 ===== -->
        <div id="start-screen">
            <div class="crown">👑</div>
            
            <div class="player-card">
                <div class="avatar-container">👧</div>
                <div class="player-name">楚楚</div>
                <div class="player-title">✨ 单词小勇士 ✨</div>
            </div>
            
            <div class="story-text">
                亲爱的楚楚，<br><br>
                你被选中成为<b>魔法王国的守护者</b>！<br>
                每个单词都是一把魔法钥匙，<br>
                拼对了就能打败怪兽，<br>
                收集闪闪发光的宝石！💎<br><br>
                爸爸妈妈相信你一定可以！💪
            </div>
            
            <button class="start-btn" onclick="startGame()">
                开始冒险！🚀
            </button>
            
            <div class="from-dad">
                <span>💝</span> 爸爸妈妈送给楚楚的专属游戏
            </div>
        </div>
        
        <!-- ===== 游戏界面 ===== -->
        <div id="game-screen" class="hidden">
            <!-- 顶部信息栏 -->
            <div class="top-bar">
                <div class="mini-avatar">👧</div>
                <div class="player-info">
                    <div class="name">楚楚</div>
                    <div class="level">Lv.<span id="level">1</span> 单词小勇士</div>
                </div>
                <div class="hearts">
                    <span class="heart" id="h1">❤️</span>
                    <span class="heart" id="h2">❤️</span>
                    <span class="heart" id="h3">❤️</span>
                </div>
                <div class="coins">
                    <span>💎</span>
                    <span id="coins">0</span>
                </div>
            </div>
            
            <!-- 关卡标题 -->
            <div class="level-title">
                <h2>🏰 第 <span id="stage">1</span> 关</h2>
                <div class="subtitle">打败怪兽，收集宝石！</div>
            </div>
            
            <!-- 游戏主区域 -->
            <div class="game-area">
                <!-- 怪物 -->
                <div class="monster-area">
                    <div class="monster-sprite" id="monster">👹</div>
                    <div class="monster-name" id="monster-name">单词小怪兽</div>
                </div>
                
                <!-- 单词提示 -->
                <div class="word-clue">
                    <div class="clue-label">🔮 这个单词的意思是：</div>
                    <div class="clue-meaning" id="meaning">保护区；预留、预定</div>
                    <div class="clue-length" id="length">7个字母</div>
                </div>
                
                <!-- 字母格子 -->
                <div class="letter-grid" id="letter-grid"></div>
                
                <!-- 输入区 -->
                <div class="input-section">
                    <div class="hint-row">
                        <button class="hint-btn" id="hint-btn" onclick="useHint()">
                            💡 提示 (-5💎)
                        </button>
                        <button class="hint-btn" onclick="playSound()">
                            🔊 听发音
                        </button>
                    </div>
                    <div class="hint-display" id="hint-display"></div>
                    <input type="text" class="word-input" id="word-input" 
                           placeholder="输入单词打败怪兽！" autocomplete="off">
                </div>
                
                <!-- 鼓励语 -->
                <div class="encouragement" id="encourage">
                    楚楚加油！你可以的！💪
                </div>
            </div>
        </div>
        
        <!-- ===== 成功动画 ===== -->
        <div class="success-overlay" id="success-overlay">
            <div class="success-content">
                <div class="success-icon">🎉</div>
                <div class="success-text">太棒了楚楚！</div>
                <div class="success-points">+20💎</div>
            </div>
        </div>
        
        <!-- ===== 结果界面 ===== -->
        <div class="result-overlay" id="result-overlay">
            <div class="result-card">
                <div class="result-avatar" id="result-avatar">👧</div>
                <div class="result-title" id="result-title">游戏结束</div>
                <div class="result-message" id="result-message">
                    楚楚已经很棒了！<br>下次一定能打败更多怪兽！
                </div>
                <div class="gems-collected">
                    <div class="gems-row" id="gems-row"></div>
                </div>
                <div class="result-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="final-coins">0</div>
                        <div class="stat-label">收集宝石</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="final-level">1</div>
                        <div class="stat-label">到达关卡</div>
                    </div>
                </div>
                <button class="result-btn" onclick="restartGame()">
                    再来一次！💪
                </button>
            </div>
        </div>
    </div>

    <script>
        // 楚楚的单词库
        const words = [
            { word: 'reserve', meaning: '保护区；预留、预定', hint: 'r开头，e结尾' },
            { word: 'original', meaning: '原始的、原创的', hint: 'o开头，l结尾' },
            { word: 'glamorous', meaning: '富有魅力的', hint: 'g开头，s结尾' },
            { word: 'feedback', meaning: '反馈', hint: 'f开头，k结尾' },
            { word: 'critical', meaning: '关键的、批判性的', hint: 'c开头，l结尾' },
            { word: 'vivid', meaning: '生动的', hint: 'v开头，d结尾' },
            { word: 'intimate', meaning: '亲密的', hint: 'i开头，e结尾' },
            { word: 'acquaintance', meaning: '熟人', hint: 'a开头，e结尾' },
            { word: 'appropriate', meaning: '适当的', hint: 'a开头，e结尾' },
            { word: 'endangered', meaning: '濒危的', hint: 'e开头，d结尾' },
            { word: 'plot', meaning: '情节', hint: 'p开头，t结尾' },
            { word: 'repair', meaning: '修理', hint: 'r开头，r结尾' }
        ];
        
        // 怪物列表
        const monsters = [
            { sprite: '👹', name: '捣蛋小怪兽' },
            { sprite: '👺', name: '调皮大王' },
            { sprite: '👻', name: '迷糊小幽灵' },
            { sprite: '🧟', name: '笨笨僵尸' },
            { sprite: '🐲', name: '贪吃小龙' },
            { sprite: '🦹', name: '捣乱小魔王' },
            { sprite: '👿', name: '淘气小恶魔' },
            { sprite: '🤖', name: '乱码机器人' },
            { sprite: '👾', name: '外星小怪兽' },
            { sprite: '🦖', name: '单词小恐龙' }
        ];
        
        // 鼓励语
        const encouragements = [
            '楚楚加油！你可以的！💪',
            '楚楚最棒了！继续！🌟',
            '相信你自己！✨',
            '你一定行！加油！💖',
            '爸爸妈妈相信你！💝',
            '楚楚是单词小勇士！🦸‍♀️',
            '打败它！楚楚！⚔️'
        ];
        
        // 宝石
        const gems = ['💎', '💜', '💙', '💚', '💛', '🧡', '❤️'];
        
        // 游戏状态
        let game = {
            coins: 0,
            level: 1,
            hearts: 3,
            currentWord: null,
            usedWords: [],
            collectedGems: [],
            isPlaying: false
        };
        
        // 创建星星背景
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 20; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.textContent = '✨';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        createStars();
        
        // 开始游戏
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            game = {
                coins: 0,
                level: 1,
                hearts: 3,
                currentWord: null,
                usedWords: [],
                collectedGems: [],
                isPlaying: true
            };
            
            updateUI();
            nextWord();
            document.getElementById('word-input').focus();
        }
        
        // 更新界面
        function updateUI() {
            document.getElementById('level').textContent = game.level;
            document.getElementById('stage').textContent = game.level;
            document.getElementById('coins').textContent = game.coins;
            
            for (let i = 1; i <= 3; i++) {
                document.getElementById('h' + i).classList.toggle('lost', i > game.hearts);
            }
            
            // 更新鼓励语
            document.getElementById('encourage').textContent = 
                encouragements[Math.floor(Math.random() * encouragements.length)];
        }
        
        // 下一关
        function nextWord() {
            const available = words.filter(w => !game.usedWords.includes(w.word));
            if (available.length === 0) {
                game.usedWords = [];
                nextWord();
                return;
            }
            
            // 随机选择单词
            game.currentWord = available[Math.floor(Math.random() * available.length)];
            game.usedWords.push(game.currentWord.word);
            
            // 随机怪物
            const monster = monsters[Math.floor(Math.random() * monsters.length)];
            document.getElementById('monster').textContent = monster.sprite;
            document.getElementById('monster-name').textContent = monster.name;
            
            // 显示提示
            document.getElementById('meaning').textContent = game.currentWord.meaning;
            document.getElementById('length').textContent = game.currentWord.word.length + '个字母';
            document.getElementById('hint-display').textContent = '';
            
            // 创建字母格子
            const grid = document.getElementById('letter-grid');
            grid.innerHTML = '';
            for (let i = 0; i < game.currentWord.word.length; i++) {
                const cell = document.createElement('div');
                cell.className = 'letter-cell';
                cell.id = 'cell-' + i;
                grid.appendChild(cell);
            }
            
            // 清空输入
            document.getElementById('word-input').value = '';
            document.getElementById('hint-btn').disabled = false;
        }
        
        // 使用提示
        function useHint() {
            if (game.coins >= 5 && game.currentWord) {
                game.coins -= 5;
                updateUI();
                document.getElementById('hint-display').textContent = '💡 ' + game.currentWord.hint;
                document.getElementById('hint-btn').disabled = true;
            }
        }
        
        // 发音
        function playSound() {
            if (game.currentWord && 'speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(game.currentWord.word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            }
        }
        
        // 检查答案
        function checkAnswer(input) {
            const word = game.currentWord.word.toLowerCase();
            const answer = input.toLowerCase().trim();
            
            // 更新字母格子
            for (let i = 0; i < word.length; i++) {
                const cell = document.getElementById('cell-' + i);
                if (answer[i]) {
                    cell.textContent = answer[i];
                    if (answer[i] === word[i]) {
                        cell.classList.add('correct');
                    } else {
                        cell.classList.add('wrong');
                    }
                }
            }
            
            if (answer === word) {
                // 正确！
                game.coins += 20;
                game.level++;
                game.collectedGems.push(gems[Math.floor(Math.random() * gems.length)]);
                
                // 怪物受击动画
                document.getElementById('monster').classList.add('hit');
                setTimeout(() => {
                    document.getElementById('monster').classList.remove('hit');
                }, 500);
                
                // 显示成功动画
                showSuccess();
                
            } else if (answer.length === word.length) {
                // 错误
                game.hearts--;
                updateUI();
                
                if (game.hearts <= 0) {
                    setTimeout(() => showResult(false), 500);
                } else {
                    setTimeout(() => {
                        for (let i = 0; i < word.length; i++) {
                            const cell = document.getElementById('cell-' + i);
                            cell.textContent = '';
                            cell.classList.remove('correct', 'wrong');
                        }
                        document.getElementById('word-input').value = '';
                    }, 800);
                }
            }
        }
        
        // 显示成功动画
        function showSuccess() {
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                updateUI();
                
                if (game.level > 10) {
                    showResult(true);
                } else {
                    nextWord();
                }
            }, 1200);
        }
        
        // 显示结果
        function showResult(isWin) {
            game.isPlaying = false;
            
            const overlay = document.getElementById('result-overlay');
            overlay.style.display = 'flex';
            
            document.getElementById('result-title').textContent = isWin ? '恭喜通关！🎉' : '游戏结束';
            document.getElementById('result-title').className = 'result-title ' + (isWin ? 'win' : 'lose');
            
            document.getElementById('result-message').innerHTML = isWin 
                ? '楚楚太厉害了！<br>你是真正的单词小勇士！🏆'
                : '楚楚已经很棒了！<br>下次一定能打败更多怪兽！💪';
            
            document.getElementById('final-coins').textContent = game.coins;
            document.getElementById('final-level').textContent = game.level;
            
            // 显示收集的宝石
            const gemsRow = document.getElementById('gems-row');
            gemsRow.innerHTML = '';
            game.collectedGems.forEach((gem, i) => {
                setTimeout(() => {
                    const span = document.createElement('span');
                    span.className = 'gem';
                    span.textContent = gem;
                    gemsRow.appendChild(span);
                }, i * 100);
            });
        }
        
        // 重新开始
        function restartGame() {
            document.getElementById('result-overlay').style.display = 'none';
            startGame();
        }
        
        // 输入监听
        document.getElementById('word-input').addEventListener('input', function(e) {
            if (!game.isPlaying || !game.currentWord) return;
            
            const input = e.target.value;
            const word = game.currentWord.word;
            
            // 实时更新字母格子
            for (let i = 0; i < word.length; i++) {
                const cell = document.getElementById('cell-' + i);
                if (input[i]) {
                    cell.textContent = input[i];
                    cell.classList.add('active');
                } else {
                    cell.textContent = '';
                    cell.classList.remove('active', 'correct', 'wrong');
                }
            }
            
            // 输入完整时检查
            if (input.length === word.length) {
                checkAnswer(input);
            }
        });
    </script>
</body>
</html>
